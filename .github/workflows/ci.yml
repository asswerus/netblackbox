name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Run quality checks
        shell: bash
        run: |
          status=0

          mapfile -d '' black_files < <(
            find src tests -type f -name '*.py' \
              ! -path 'src/netblackbox/__main__.py' \
              ! -path 'src/netblackbox/app.py' \
              ! -path 'src/netblackbox/platforms.py' \
              ! -path 'src/netblackbox/plugins.py' \
              ! -path 'tests/test_classification.py' \
              -print0
          )

          black --check "${black_files[@]}" || status=1
          ruff check src tests || status=1
          mypy src/netblackbox || status=1

          exit "$status"

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest
      - run: python -m pip install -e .
      - run: pytest
